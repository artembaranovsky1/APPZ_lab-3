<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дошка оголошень | BoardAPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-layers-half me-2"></i>BoardAPI</a>
        <div class="d-flex align-items-center">
            <button class="btn btn-success me-4" data-bs-toggle="modal" data-bs-target="#createAdModal">
                <i class="bi bi-plus-lg me-1"></i> Створити оголошення
            </button>
            <span class="text-light me-3"><i class="bi bi-person-circle me-1"></i> <span id="currentUserDisplay"></span></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Вийти</button>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row mb-4 align-items-center">
        <div class="col-md-4">
            <h4 class="m-0"><i class="bi bi-card-list me-2"></i>Стрічка оголошень</h4>
        </div>
        <div class="col-md-6">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Пошук за назвою або тегами (натисніть Enter)...">
                <button class="btn btn-primary px-4" onclick="executeSearch()">Знайти</button>
            </div>
        </div>
        <div class="col-md-2 text-end">
            <button class="btn btn-light shadow-sm w-100" onclick="loadAds()"><i class="bi bi-arrow-clockwise"></i> Усі</button>
        </div>
    </div>

    <div id="adsList" class="row g-3">
    </div>
</div>

<div class="modal fade" id="createAdModal" tabindex="-1" aria-labelledby="createAdModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title" id="createAdModalLabel"><i class="bi bi-plus-circle-fill text-success me-2"></i>Нове оголошення</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="createAdForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Заголовок</label>
                        <input type="text" class="form-control" id="title" required maxlength="100" placeholder="Що продаємо?">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Опис</label>
                        <textarea class="form-control" id="content" rows="4" required maxlength="100" placeholder="Деталі товару..."></textarea>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label text-muted small fw-bold text-uppercase">Ціна (грн)</label>
                            <input type="number" class="form-control" id="price" required min="0">
                        </div>
                        <div class="col-6">
                            <label class="form-label text-muted small fw-bold text-uppercase">Категорія</label>
                            <input type="text" class="form-control" id="categoryName" required maxlength="100" placeholder="Електроніка">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold text-uppercase">Теги</label>
                        <input type="text" class="form-control" id="tagNames" placeholder="через кому: авто, нове" maxlength="100">
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2"><i class="bi bi-send-fill me-2"></i>Опублікувати</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
