<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | BoardAPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">

<div class="card login-card p-4">
    <div class="text-center mb-4">
        <i class="bi bi-box-seam text-primary" style="font-size: 3rem;"></i>
        <h3 class="mt-2">Вхід у систему</h3>
        <p class="text-muted">Введіть своє ім'я для продовження</p>
    </div>
    <form id="loginForm">
        <div class="mb-3">
            <input type="text" class="form-control form-control-lg" id="usernameInput" placeholder="Ваше ім'я..." required maxlength="50">
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" id="loginBtn">Увійти <i class="bi bi-box-arrow-in-right"></i></button>
    </form>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
